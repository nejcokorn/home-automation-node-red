<script type="text/javascript">
	RED.nodes.registerType('ha-set-config', {
		category: 'home automation',
		color: '#D99B66',
				// #595336
				// #D99B66
				// #F2CEAE
				// #BF9075
				// #F2E0D5
		defaults: {
			agent: {
				type: "ha-agent",
				required: true
			},
			deviceId: {
				required: true,
			},
			deviceIdMetadata: {
				default: {
					type: "num"
				}
			},
			inputPort: {
				required: true,
			},
			inputPortMetadata: {
				default: {
					type: "num"
				}
			},
			debounce: {
				required: false,
			},
			debounceMetadata: {
				default: {
					type: "num"
				}
			},
			doubleclick: {
				required: false,
			},
			doubleclickMetadata: {
				default: {
					type: "num"
				}
			},
			bypassInstantly: {
				required: false,
			},
			bypassInstantlyMetadata: {
				default: {
					type: "bypass"
				}
			},
			bypassOnDisconnect: {
				required: false,

			},
			bypassOnDisconnectMetadata: {
				default: {
					type: "bypass"
				}
			},
		},
		inputs: 1,
		outputs: 1,
		outputLabels: ['port'],
		icon: "font-awesome/fa-cogs",
		align: 'right',
		oneditprepare: function() {
			$("#node-input-deviceId").typedInput({
				default: "num",
				types: ["num","msg","flow","global","env","jsonata","re"],
				typeField: "#node-input-deviceIdMetadata"
			});
			$("#node-input-inputPort").typedInput({
				default: "num",
				types: ["num","msg","flow","global","env","jsonata","re"],
				typeField: "#node-input-inputPortMetadata"
			});
			$("#node-input-debounce").typedInput({
				default: "num",
				types: ["num","msg","flow","global","env","jsonata","re"],
				typeField: "#node-input-debounceMetadata"
			});
			$("#node-input-doubleclick").typedInput({
				default: "num",
				types: ["num","msg","flow","global","env","jsonata","re"],
				typeField: "#node-input-doubleclickMetadata"
			});
			$("#node-input-bypassInstantly").typedInput({
				default: "bypass",
				types: [{
					value: "bypass",
					options: [
						{ value: "1", label: "True" },
						{ value: "0", label: "False" }
					]
				},"msg","flow","global","env","jsonata","re"],
				typeField: "#node-input-bypassInstantlyMetadata"
			});
			$("#node-input-bypassOnDisconnect").typedInput({
				default: "bypass",
				types: [{
					value: "bypass",
					options: [
						{ value: "1", label: "True" },
						{ value: "0", label: "False" }
					]
				},"msg","flow","global","env","jsonata","re"],
				typeField: "#node-input-bypassOnDisconnectMetadata"
			});
		},
		oneditsave: function() {
		},
		label: function() {
			return this.name;
		}
	});
</script>
<style>
</style>
<script type="text/html" data-template-name="ha-set-config">
	<div class="form-row">
		<label for="node-input-name">
			<i class="fa fa-tag"></i>
			Name
		</label>
		<input type="text" id="node-input-name" class="offset-md-2">
	</div>
	<hr />
	<h3>Home Automation Device</h3>
	<div class="form-row">
		<label for="node-input-agent">Agent</label>
		<input type="text" id="node-input-agent">
		<br />
		<small id="node-help-agent">Select the Home Automation agent configuration to use for the request.</small>
	</div>
	<div class="form-row">
		<label for="node-input-deviceId">Device ID</label>
		<input id="node-input-deviceId">
		<input type="hidden" id="node-input-deviceIdMetadata">
		<br />
		<small id="node-help-deviceId">Enter the target device to send this configuration to.</small>
	</div>
	<hr />
	<h3>Input settings</h3>
	<div class="form-row">
		<label for="node-input-inputPort">Input Port</label>
		<input id="node-input-inputPort">
		<input type="hidden" id="node-input-inputPortMetadata">
		<br />
		<small id="node-help-inputPort">Select the input port to configure the device.</small>
	</div>
	<div class="form-row">
		<label for="node-input-debounce">Debounce</label>
		<input id="node-input-debounce">
		<input type="hidden" id="node-input-debounceMetadata">
		<br />
		<small id="node-help-debounce">Debounce time for this input (in microseconds).</small>
	</div>
	<div class="form-row">
		<label for="node-input-doubleclick">Double-click</label>
		<input id="node-input-doubleclick">
		<input type="hidden" id="node-input-doubleclickMetadata">
		<br />
		<small id="node-help-doubleclick">If any actions rely on double-click mode, set the timeout (in milliseconds).</small>
	</div>
	<hr />
	<h3>Execute conditions</h3>
	<div class="form-row">
		<label for="node-input-bypassInstantly">Instantly</label>
		<input id="node-input-bypassInstantly">
		<input type="hidden" id="node-input-bypassInstantlyMetadata">
		<br />
		<small id="node-help-bypassInstantly">Execute actions linked to this input immediately.</small>
	</div>
	<div class="form-row">
		<label for="node-input-bypassOnDisconnect">On disconnect</label>
		<input id="node-input-bypassOnDisconnect">
		<input type="hidden" id="node-input-bypassOnDisconnectMetadata">
		<br />
		<small id="node-help-bypassOnDisconnect">Execute actions linked to this input when disconnected from the master.</small>
	</div>
</script>

<script type="text/html" data-help-name="ha-set-config">
	<p>Sends input configuration and action definitions to a device via the Home Automation agent.</p>
	<h3>Inputs</h3>
	<dl class="message-properties">
		<dt>msg</dt>
		<dd>Payload should be an array of actions (for example, output from one or more <strong>ha-set-config-action</strong> nodes). Any input triggers the request.</dd>
	</dl>
	<h3>Outputs</h3>
	<dl class="message-properties">
		<dt>payload</dt>
		<dd>Configuration response returned by the agent.</dd>
	</dl>
	<h3>Details</h3>
	<p>Configure the target Device ID, input port index, debounce and double-click timing, and whether actions should execute instantly or on disconnect.</p>
</script>
