<script type="text/javascript">
	RED.nodes.registerType('ha-device-event', {
		category: 'home automation',
		color: '#BF9075',
				// #595336
				// #D99B66
				// #F2CEAE
				// #BF9075
				// #F2E0D5
		defaults: {
			name: {
				value: ""
			},
			agent: {
				type: "ha-agent",
				required: true
			},
			deviceId: {
				value: "",
				required: true
			},
			deviceIdMetadata: {
				default: {
					type: "num"
				}
			},
			direction: {
				required: true
			},
			directionMetadata: {
				default: {
					type: "str"
				}
			},
			port: {
				required: true
			},
			portMetadata: {
				default: {
					type: "num"
				}
			},
			qos: {
				value: "0",
				required: true
			},
			qosMetadata: {
				default: {
					type: "num"
				}
			}
		},
		inputs: 0,
		outputs: 1,
		outputLabels: ['event'],
		icon: "bridge.svg",
		oneditprepare: function() {
			$("#node-input-deviceId").typedInput({
				default: "num",
				types: ["num","flow","global","env","jsonata"],
				typeField: "#node-input-deviceIdMetadata"
			});
			$("#node-input-direction").typedInput({
				default: "direction",
				types: [{
					value: "direction",
					options: [
						{ value: "input", label: "input" },
						{ value: "output", label: "output" }
					]
				},"flow","global","env","jsonata"],
				typeField: "#node-input-directionMetadata"
			});
			$("#node-input-port").typedInput({
				default: "num",
				types: ["num","flow","global","env","jsonata"],
				typeField: "#node-input-portMetadata"
			});
			$("#node-input-qos").typedInput({
				default: "qos",
				types: [{
					value: "qos",
					options: [
						{ value: "0", label: "0 - at most once" },
						{ value: "1", label: "1 - at least once" },
						{ value: "2", label: "2 - exactly once" }
					]
				},"flow","global","env","jsonata"],
				typeField: "#node-input-qosMetadata"
			});
		},
		label: function() {
			return this.name || "device event";
		}
	});
</script>

<script type="text/html" data-template-name="ha-device-event">
	<div class="form-row">
		<label for="node-input-name">
			<i class="fa fa-tag"></i>
			Name
		</label>
		<input type="text" id="node-input-name" class="offset-md-2">
	</div>
	<hr />
	<h3>Home Automation Device</h3>
	<div class="form-row">
		<label for="node-input-agent">Agent</label>
		<input type="text" id="node-input-agent">
		<br />
		<small id="node-help-agent">Select the Home Automation agent configuration to use for MQTT events.</small>
	</div>
	<div class="form-row">
		<label for="node-input-deviceId">Device ID</label>
		<input id="node-input-deviceId" placeholder="1">
		<input type="hidden" id="node-input-deviceIdMetadata">
		<br />
		<small id="node-help-deviceId">Enter the device ID to listen for.</small>
	</div>
	<h3>Events</h3>
	<div class="form-row">
		<label for="node-input-direction">Direction</label>
		<input id="node-input-direction">
		<input type="hidden" id="node-input-directionMetadata">
		<br />
		<small id="node-help-direction">Select the device port type.</small>
	</div>
	<div class="form-row">
		<label for="node-input-port">Port</label>
		<input id="node-input-port">
		<input type="hidden" id="node-input-portMetadata">
		<br />
		<small id="node-help-port">Enter the device port number; Output ports (0-11), Input ports (0-15).</small>
	</div>
	<div class="form-row">
		<label for="node-input-qos">QoS</label>
		<input id="node-input-qos">
		<input type="hidden" id="node-input-qosMetadata">
		<br />
		<small id="node-help-qos">Select the MQTT subscription QoS.</small>
	</div>
</script>

<script type="text/html" data-help-name="ha-device-event">
	<p>Listens for device input and output change events published by the selected Home Automation agent over MQTT.</p>
	<h3>Outputs</h3>
	<dl class="message-properties">
		<dt>payload</dt>
		<dd>Parsed device event payload published by the agent.</dd>
		<dt>topic</dt>
		<dd>The MQTT topic that matched the event.</dd>
		<dt>event</dt>
		<dd>Parsed event metadata: iface, deviceId, direction, and port.</dd>
	</dl>
	<h3>Details</h3>
	<p>The node subscribes to one specific event topic for the selected agent CAN bus, device ID, direction, and port with the configured MQTT QoS.</p>
</script>
