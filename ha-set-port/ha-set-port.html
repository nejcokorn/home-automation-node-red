<script type="text/javascript">
	RED.nodes.registerType('ha-set-port', {
		category: 'home automation',
		color: '#BF9075',
				// #595336
				// #D99B66
				// #F2CEAE
				// #BF9075
				// #F2E0D5
		defaults: {
			name: {
				value: ""
			},
			agent: {
				type: "ha-agent",
				required: true
			},
			deviceId: {
				required: true
			},
			deviceIdMetadata: {
				default: {
					type: "num"
				}
			},
			actionPort: {
				required: true
			},
			actionPortMetadata: {
				default: {
					type: "num"
				}
			},
			actionType: {
				required: true
			},
			actionTypeMetadata: {
				default: {
					type: "str"
				}
			},
			actionDelay: {
				value: 0
			},
			actionDelayMetadata: {
				default: {
					type: "num"
				}
			},
		},
		inputs: 1,
		outputs: 1,
		outputLabels: ['port'],
		icon: "font-awesome/fa-sign-out",
		align: 'right',
		oneditprepare: function() {
			$("#node-input-deviceId").typedInput({
				default: "num",
				types: ["num","msg","flow","global","env","jsonata","re"],
				typeField: "#node-input-deviceIdMetadata"
			});
			$("#node-input-actionPort").typedInput({
				default: "num",
				types: ["num","msg","flow","global","env","jsonata","re"],
				typeField: "#node-input-actionPortMetadata"
			});
			$("#node-input-actionType").typedInput({
				default: "type",
				types: [{
					value: "type",
					options: [
						{ value: "low", label: "low" },
						{ value: "high", label: "high" },
						{ value: "toggle", label: "toggle" }
					]
				},"msg","flow","global","env","jsonata","re"],
				typeField: "#node-input-actionTypeMetadata"
			});
			$("#node-input-actionDelay").typedInput({
				default: "num",
				types: ["num","msg","flow","global","env","jsonata","re"],
				typeField: "#node-input-actionDelayMetadata"
			});
		},
		label: function() {
			return this.name;
		}
	});
</script>

<script type="text/html" data-template-name="ha-set-port">
	<div class="form-row">
		<label for="node-input-name">
			<i class="fa fa-tag"></i>
			Name
		</label>
		<input type="text" id="node-input-name" class="offset-md-2">
	</div>
	<hr />
	<h3>Home Automation Device</h3>
	<div class="form-row">
		<label for="node-input-agent">Agent</label>
		<input type="text" id="node-input-agent">
		<br />
		<small id="node-help-agent">Select the Home Automation agent configuration to use for the request.</small>
	</div>
	<div class="form-row">
		<label for="node-input-deviceId">Device ID</label>
		<input id="node-input-deviceId">
		<input type="hidden" id="node-input-deviceIdMetadata">
		<br />
		<small id="node-help-deviceId">Enter the target device to send this action to.</small>
	</div>
	<h3>Action</h3>
	<div class="form-row">
		<label for="node-input-actionPort">Output port</label>
		<input id="node-input-actionPort">
		<input type="hidden" id="node-input-actionPortMetadata">
		<br />
		<small id="node-help-actionPort">Enter the device port number (0-11).</small>
	</div>
	<div class="form-row">
		<label for="node-input-actionType">Type</label>
		<input id="node-input-actionType">
		<input type="hidden" id="node-input-actionTypeMetadata">
		<br />
		<small id="node-help-actionType">Change the output port state to low, high, or toggle (invert the current value).</small>
	</div>
	<div class="form-row">
		<label for="node-input-actionDelay">Delay</label>
		<input id="node-input-actionDelay">
		<input type="hidden" id="node-input-actionDelayMetadata">
		<br />
		<small id="node-help-actionDelay">In miliseconds, 0 = no delay</small>
	</div>
</script>

<script type="text/html" data-help-name="ha-set-port">
	<p>Sets the state of a device output port via the selected Home Automation agent.</p>
	<h3>Inputs</h3>
	<dl class="message-properties">
		<dt>msg</dt>
		<dd>Any input message triggers the action.</dd>
	</dl>
	<h3>Outputs</h3>
	<dl class="message-properties">
		<dt>payload</dt>
		<dd>Action response returned by the agent.</dd>
	</dl>
	<h3>Details</h3>
	<p>Choose an output port (0-11), an action type, and an optional delay.</p>
</script>
